# Disable install scripts globally as a hardening measure. Packages that
# legitimately need a postinstall step are opted in via `dependenciesMeta`
# in the root package.json, so a future supply-chain attack on an
# unrelated package can't auto-execute on `yarn install`.
enableScripts: false

nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.14.1.cjs
