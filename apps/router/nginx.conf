# Opt-in routing to the new frontend. Default = stable frontend; the
# beabee_frontend cookie (set via ?frontend=new) routes a user to the new one.
map $cookie_beabee_frontend $frontend_upstream {
  default  "${HIVE_SERVICE_FRONTEND}:80";
  "new"    "${HIVE_SERVICE_FRONTEND_NEW}:80";
}

# ?frontend=new opts in, ?frontend=off opts out; empty value => no Set-Cookie emitted.
map $arg_frontend $set_frontend_cookie {
  default  "";
  "new"    "beabee_frontend=new; Path=/; Max-Age=31536000; SameSite=Lax";
  "off"    "beabee_frontend=; Path=/; Max-Age=0; SameSite=Lax";
}

server {
  listen       80;
  listen  [::]:80;
  server_name  _;

  # Set maximum upload size to 20MB, search for `MAX_FILE_SIZE_IN_BYTES` in the codebase if you want to change this
  client_max_body_size 20M;

  set $legacy_app "${HIVE_SERVICE_APP}:3000";
  set $api_app "${HIVE_SERVICE_API_APP}:3000";
  set $webhook_app "${HIVE_SERVICE_WEBHOOK_APP}:3000";
  set $frontend_app $frontend_upstream;

  resolver ${NGINX_RESOLVER};

  proxy_cookie_domain ${LEGACY_APP_COOKIE_DOMAIN} $host;

  # Redirect old URLs to new ones
  absolute_redirect off;
  rewrite ^/login/?$ /auth/login permanent;
  rewrite ^/callouts(.*)$ /crowdnewsroom$1 permanent;
  rewrite ^/admin/callouts(.*)$ /admin/crowdnewsroom$1 permanent;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml;
  gzip_min_length 256;

  location /.well-known {
      root /usr/share/nginx/html;
  }

  # Frontend

  location ~ ^/(assets|profile|contacts|crowdnewsroom|join|auth|admin|_theme|embed.js) {
    # Proxy scrapers to legacy app for metadata
    if ($http_user_agent ~* "linkedinbot|googlebot|yahoo|bingbot|baiduspider|yandex|yeti|yodaobot|gigabot|ia_archiver|facebookexternalhit|twitterbot|developers\.google\.com") {
        proxy_pass $legacy_app/share?uri=$request_uri;
    }

    include sec_headers;
    add_header Content-Security-Policy "frame-ancestors ${TRUSTED_ORIGINS}";
    add_header Set-Cookie $set_frontend_cookie;

    proxy_pass $frontend_app;
  }

  # Backend

  include sec_headers;
  add_header Content-Security-Policy "frame-ancestors 'none'";

  location ~ ^/(robots\.txt|android-chrome|apple-touch-icon\.png|browserconfig\.xml|favicon|mstile|safari-pinned-tab\.svg|site\.webmanifest) {
    proxy_pass $legacy_app;
    access_log off;
    log_not_found off;
  }

  location ~ ^/api/(.*)$ {
      proxy_pass $api_app/$1$is_args$args;
  }

  location ~ ^/webhook/(.*)$ {
      proxy_pass $webhook_app/$1$is_args$args;
  }

  # Fallback route for old image uploads with size directories
  location ~ ^/uploads/([0-9]+x[0-9]+)/(.+)$ {
    root /;
    # Use only the filename for size-prefixed paths
    try_files /old_data/$2/$2 =404;
  }

  # Fallback route for regular old image uploads
  location ~ ^/uploads/(.*)$ {
    root /;
    try_files /old_data/$1/$1 =404;
  }

  # Fallback route to the legacy app
  location / {
    proxy_pass $legacy_app;
  }
}
