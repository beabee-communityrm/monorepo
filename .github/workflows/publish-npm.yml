name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Pack and verify without actually publishing'
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Determine npm dist-tag
        id: tag
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ] || [ "$IS_PRERELEASE" = "true" ]; then
            echo "value=next" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack workspaces
        run: yarn workspaces foreach -v -W --no-private pack

      - name: Publish to npm (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        env:
          DIST_TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          find packages apps -maxdepth 2 -name 'package.tgz' -print0 |
            while IFS= read -r -d '' tarball; do
              echo "::group::Dry-run publish $tarball"
              npm publish "$tarball" --tag "$DIST_TAG" --access public --dry-run
              echo "::endgroup::"
            done

      - name: Publish to npm
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        env:
          DIST_TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          find packages apps -maxdepth 2 -name 'package.tgz' -print0 |
            while IFS= read -r -d '' tarball; do
              echo "::group::Publish $tarball"
              npm publish "$tarball" --tag "$DIST_TAG" --access public
              echo "::endgroup::"
            done
