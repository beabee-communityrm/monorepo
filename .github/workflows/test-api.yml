name: API tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request_review:
    types: [submitted]

jobs:
  run-api-tests:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: beabee-api-tests-${{ github.run_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          stripe_public_key: ${{ secrets.BEABEE_STRIPE_PUBLICKEY }}
          stripe_secret_key: ${{ secrets.BEABEE_STRIPE_SECRETKEY }}

      - uses: ./.github/actions/test-setup
        with:
          stripe_webhook_secret: ${{ secrets.BEABEE_STRIPE_WEBHOOKSECRET }}
          stripe_membership_product_id: ${{ secrets.BEABEE_STRIPE_MEMBERSHIPPRODUCTID }}

      - name: Run API tests
        run: yarn vitest run src/tests/node/platform.test.ts # sample // this only runs fetch test

      - name: Export database
        if: failure()
        run: docker compose -f docker-compose.test.yml exec -T api_app yarn backend-cli database export --anonymize=none >> api-test-dump.sql

      - name: Upload database dump
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database
          path: ./api-test-dump.sql

      - name: Export Docker logs
        if: failure()
        run: docker compose -f docker-compose.test.yml logs >> "./docker-compose.log"

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: ./docker-compose.log
