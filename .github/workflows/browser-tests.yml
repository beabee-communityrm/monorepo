name: Browser tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request_review:
    types: [submitted]

jobs:
  run-browser-tests:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: beabee-browser-tests-${{ github.run_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          stripe_public_key: ${{ secrets.BEABEE_STRIPE_PUBLICKEY }}
          stripe_secret_key: ${{ secrets.BEABEE_STRIPE_SECRETKEY }}

      - uses: ./.github/actions/test-setup
        with:
          stripe_webhook_secret: ${{ secrets.BEABEE_STRIPE_WEBHOOKSECRET }}
          stripe_membership_product_id: ${{ secrets.BEABEE_STRIPE_MEMBERSHIPPRODUCTID }}

      - name: Playwright Setup
        run: yarn workspace @beabee/browser-tests playwright install firefox --with-deps

      - name: Run browser tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.BEABEE_AUDIENCE }}
        run: yarn workspace @beabee/browser-tests test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./apps/browser-tests/playwright-report

      - name: Teardown
        if: failure()
        uses: ./.github/actions/test-teardown
        with:
          db_name: "browser-test-dump"
