name: Lint PR title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Must match the types in .release-it.json so PR titles → merge
          # commit subjects → conventional-changelog all stay consistent.
          types: |
            feat
            fix
            perf
            revert
            chore
            refactor
            docs
            test
            build
            ci
          requireScope: false
          # Allow lowercase or uppercase first letter in the subject.
          subjectPattern: ^.+$
